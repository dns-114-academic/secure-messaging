<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Messagerie sécurisée</title>

  <style>
    
    #message {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    
    #chatForm {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      margin-left: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .chat-box {
      width: 100%;
      max-width: 700px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 20px;
    }

    
    #chat {
      height: 420px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 15px;
      background-color: #f9f9f9;
      display: flex;
      flex-direction: column;
    }

    .sent, .received {
      padding: 10px 15px;
      border-radius: 20px;
      margin: 5px 0;
      max-width: 80%;
      display: inline-block;
      word-wrap: break-word;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .sent {
      background-color: #007bff;
      color: white;
      align-self: flex-end;
      border-radius: 10px;
    }

    .received {
      background-color: #e2e2e2;
      color: black;
      align-self: flex-start;
      border-radius: 8px;
    }

    
    .config {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .config input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      min-width: 240px;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="chat-box">
    <h2 style="margin-top: 0;">Messagerie</h2>

    
    <div class="config">
      <label>
        Cible (nom) :
        <input type="text" id="targetName" value="Bob" />
      </label>

      <label>
        Cible (URL) :
        <input type="text" id="targetUrl" value="http://127.0.0.1:5002" />
      </label>
    </div>

    <div class="hint">
      Le navigateur envoie vers <code>/send</code> et rafraîchit via <code>/messages</code>.
    </div>

    <div id="chat"></div>

    <form id="chatForm">
      <input type="text" id="message" placeholder="Message" required />
      <button type="submit">Envoyer</button>
    </form>
  </div>

  <script>
    const chatBox = document.getElementById("chat");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");
    const targetNameInput = document.getElementById("targetName");
    const targetUrlInput = document.getElementById("targetUrl");

    // Au chargement, on détecte qui on est pour deviner à qui on parle
    window.onload = function() {
        const myPort = window.location.port; // 5001 ou 5002
        
        if (myPort === "5001") {
            // Si je suis sur 5001 (Alice), je configure pour parler à Bob (5002)
            targetNameInput.value = "Bob";
            targetUrlInput.value = "http://127.0.0.1:5002";
        } else if (myPort === "5002") {
            // Si je suis sur 5002 (Bob), je configure pour parler à Alice (5001)
            targetNameInput.value = "Alice";
            targetUrlInput.value = "http://127.0.0.1:5001";
        }
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = input.value;
      const target_name = targetNameInput.value;
      const target_url = targetUrlInput.value;

      await fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: msg,
          target_name: target_name,
          target_url: target_url
        })
      });

      input.value = "";
      await fetchMessages();
    });

    async function fetchMessages() {
      try {
          const res = await fetch("/messages");
          if (res.ok) {
              const data = await res.json();
              chatBox.innerHTML = "";
              data.forEach(msg => {
                const div = document.createElement("div");
                div.className = msg.startsWith("[") ? "sent" : "received";
                div.textContent = msg;
                chatBox.appendChild(div);
              });
              chatBox.scrollTop = chatBox.scrollHeight;
          }
      } catch (e) {
          console.error("Erreur polling:", e);
      }
    }

    setInterval(fetchMessages, 1000);
    fetchMessages();
  </script>

</body>
</html>

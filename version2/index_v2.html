<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureChat v2 — {{ username }}:{{ port }}</title>
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22253a;
      --border:    #2e3250;
      --accent:    #4f7ef8;
      --accent2:   #7c5cfc;
      --sent-bg:   #1e3a8a;
      --recv-bg:   #1e2640;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --radius:    12px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      flex-shrink: 0;
    }

    .identity-card {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 14px;
      border: 1px solid var(--border);
    }

    .identity-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .identity-card .name  { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .identity-card .port  { font-size: 12px; color: var(--accent); margin-top: 2px; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      vertical-align: middle;
    }

    .section-title {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .session-info {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 12px;
      border: 1px solid var(--border);
      font-size: 12px;
    }
    .session-info .peer { font-weight: 600; color: var(--accent); }
    .session-info .sid  { color: var(--text-dim); font-family: monospace; word-break: break-all; margin-top: 4px; font-size: 10px; }

    .btn-small {
      display: block;
      width: 100%;
      padding: 8px;
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: background .2s, color .2s;
      margin-top: 4px;
    }
    .btn-small:hover { background: var(--border); color: var(--text); }
    .btn-small.danger { color: var(--red); border-color: var(--red); }
    .btn-small.danger:hover { background: rgba(239,68,68,.1); }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar .peer-name { font-size: 18px; font-weight: 700; }
    .topbar .peer-url  { font-size: 12px; color: var(--text-dim); }
    .topbar .spacer    { flex: 1; }
    .topbar .enc-badge {
      font-size: 11px;
      background: rgba(34,197,94,.15);
      color: var(--green);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── Config row ── */
    .config-row {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .config-row label { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; }
    .config-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      min-width: 200px;
      outline: none;
    }
    .config-row input:focus { border-color: var(--accent); }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message bubbles ── */
    .msg-wrapper { display: flex; flex-direction: column; max-width: 70%; }
    .msg-wrapper.sent   { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.recv   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .sent  .bubble { background: var(--sent-bg); border-bottom-right-radius: 4px; }
    .recv  .bubble { background: var(--recv-bg); border-bottom-left-radius: 4px; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 10px;
      color: var(--text-dim);
    }

    .sig-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .sig-badge.ok      { background: rgba(34,197,94,.2);  color: var(--green); }
    .sig-badge.fail    { background: rgba(239,68,68,.2);  color: var(--red);   }
    .sig-badge.pending { background: rgba(245,158,11,.2); color: var(--yellow);}

    /* ── Input area ── */
    .input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #message-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      padding: 12px 18px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    #message-input:focus { border-color: var(--accent); }

    .send-btn {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
    }
    .send-btn:hover   { opacity: .9; }
    .send-btn:active  { transform: scale(.95); }
    .send-btn svg     { width: 20px; height: 20px; fill: white; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 12px;
    }
    .empty-state svg { opacity: .3; }
    .empty-state p   { font-size: 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="identity-card">
      <div class="label"><span class="status-dot"></span>Connected</div>
      <div class="name">{{ username }}</div>
      <div class="port">Port {{ port }}</div>
    </div>

    <div>
      <div class="section-title">Active Session</div>
      <div class="session-info" id="session-box">
        <div class="peer" id="session-peer">—</div>
        <div class="sid"  id="session-id">No active session</div>
      </div>
      <button class="btn-small danger" onclick="resetSession()">↺ Reset session</button>
    </div>

    <div>
      <div class="section-title">Encryption</div>
      <div class="session-info" style="font-size:11px; line-height:1.7; color:var(--text-dim);">
        <b style="color:var(--text)">Cipher:</b> AES-128-GCM<br>
        <b style="color:var(--text)">Key wrap:</b> RSA-2048 OAEP<br>
        <b style="color:var(--text)">Signatures:</b> RSA-PSS SHA-256<br>
        <b style="color:var(--text)">Auth tag:</b> 128-bit
      </div>
    </div>

    <div style="margin-top:auto">
      <button class="btn-small" onclick="window.open('/status','_blank')">📊 Status JSON</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="peer-name" id="topbar-peer">Select a peer</div>
        <div class="peer-url"  id="topbar-url">—</div>
      </div>
      <div class="spacer"></div>
      <div class="enc-badge">🔒 End-to-end encrypted</div>
    </div>

    <div class="config-row">
      <label>
        Peer name
        <input type="text" id="targetName" value="Bob" />
      </label>
      <label>
        Peer URL
        <input type="text" id="targetUrl" value="http://127.0.0.1:5002" />
      </label>
    </div>

    <div id="chat">
      <div class="empty-state" id="empty">
        <svg viewBox="0 0 64 64" width="64" height="64"><path d="M32 4C16.536 4 4 15.163 4 29c0 7.257 3.386 13.78 8.84 18.34L10 56l9.12-4.56C22.04 52.47 25.92 53 30 53h2c15.464 0 28-11.163 28-25S47.464 4 32 4z" fill="currentColor"/></svg>
        <p>No messages yet — send the first one!</p>
      </div>
    </div>

    <form class="input-area" id="chatForm">
      <input type="text" id="message-input" placeholder="Type a secure message…" autocomplete="off" required />
      <button type="submit" class="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const chatEl  = document.getElementById("chat");
    const form    = document.getElementById("chatForm");
    const input   = document.getElementById("message-input");
    const tName   = document.getElementById("targetName");
    const tUrl    = document.getElementById("targetUrl");
    const emptyEl = document.getElementById("empty");
    const toastEl = document.getElementById("toast");

    // Auto-configure based on port
    window.onload = () => {
      const port = window.location.port;
      if (port === "5001") { tName.value = "Bob";   tUrl.value = "http://127.0.0.1:5002"; }
      else if (port === "5002") { tName.value = "Alice"; tUrl.value = "http://127.0.0.1:5001"; }
      updateTopbar();
      fetchMessages();
    };

    tName.addEventListener("input", updateTopbar);
    tUrl.addEventListener("input", updateTopbar);

    function updateTopbar() {
      document.getElementById("topbar-peer").textContent = tName.value || "—";
      document.getElementById("topbar-url").textContent  = tUrl.value  || "—";
    }

    // ── Send ──────────────────────────────────────────────────────────────────
    form.addEventListener("submit", async e => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      input.value = "";

      try {
        const res = await fetch("/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message:     msg,
            target_name: tName.value,
            target_url:  tUrl.value
          })
        });
        const data = await res.json();
        if (data.session_id) updateSessionInfo(tName.value, data.session_id);
        await fetchMessages();
      } catch (err) {
        showToast("⚠ Send error: " + err.message);
      }
    });

    // ── Render messages ───────────────────────────────────────────────────────
    let lastCount = 0;

    async function fetchMessages() {
      try {
        const res  = await fetch("/messages");
        const msgs = await res.json();

        if (msgs.length === lastCount) return;
        lastCount = msgs.length;
        emptyEl.style.display = msgs.length ? "none" : "flex";

        chatEl.innerHTML = "";
        msgs.forEach(m => {
          const isSent   = m.sender && m.sender.startsWith("[Me");
          const wrapper  = document.createElement("div");
          wrapper.className = `msg-wrapper ${isSent ? "sent" : "recv"}`;

          // Bubble
          const bubble   = document.createElement("div");
          bubble.className = "bubble";
          bubble.textContent = m.text || m;

          // Meta row
          const meta = document.createElement("div");
          meta.className = "msg-meta";

          const senderLabel = document.createElement("span");
          senderLabel.textContent = isSent ? "You" : (m.sender || "?");
          meta.appendChild(senderLabel);

          if (m.timestamp) {
            const ts = document.createElement("span");
            ts.textContent = formatTime(m.timestamp);
            meta.appendChild(ts);
          }

          if (!isSent && m.verified !== undefined) {
            const badge = document.createElement("span");
            badge.className = `sig-badge ${m.verified ? "ok" : (m.verified === false ? "fail" : "pending")}`;
            badge.textContent = m.verified ? "✓ signed" : "✗ unsigned";
            meta.appendChild(badge);
          }

          wrapper.appendChild(bubble);
          wrapper.appendChild(meta);
          chatEl.appendChild(wrapper);
        });

        chatEl.scrollTop = chatEl.scrollHeight;
      } catch (err) {
        console.error("Poll error:", err);
      }
    }

    // ── Status / session ──────────────────────────────────────────────────────
    async function updateSessionInfo(peer, sid) {
      document.getElementById("session-peer").textContent = peer;
      document.getElementById("session-id").textContent   = sid ? sid.slice(0, 8) + "…" : "—";
    }

    async function refreshStatus() {
      try {
        const res  = await fetch("/status");
        const data = await res.json();
        const sessions = data.active_sessions || [];
        if (sessions.length > 0) {
          const s = sessions[0];
          updateSessionInfo(s.peer, s.session_id);
        }
      } catch (_) {}
    }

    async function resetSession() {
      const peer = tName.value;
      if (!peer) return;
      await fetch("/reset_session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ peer })
      });
      document.getElementById("session-peer").textContent = "—";
      document.getElementById("session-id").textContent   = "No active session";
      showToast(`Session with ${peer} reset`);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function formatTime(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      } catch { return ""; }
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 3000);
    }

    setInterval(fetchMessages, 1000);
    setInterval(refreshStatus, 3000);
  </script>
</body>
</html>
